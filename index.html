<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>Fasting Pro</title>
</head>
<body>

<div class="app fadein">

<header>
<h1>⏳ Fasting Pro</h1>
</header>

<section class="card center">
<div id="clock">0.0h</div>
<div id="status">尚未開始</div>
<div id="tip"></div>

<button onclick="startFast()">開始禁食</button>
<button onclick="eatNow()">進食</button>
<button onclick="hunger()">饑餓感來襲</button>
</section>

<section class="card">
<h2>⚖️ 體重</h2>
<input id="weight" type="number" placeholder="公斤">
<button onclick="saveWeight()">儲存</button>

<div id="bmi"></div>
<div id="fat"></div>
</section>

<section class="card">
<h2>📅 歷史紀錄</h2>
<div id="history"></div>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
